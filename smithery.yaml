name: csoai-governance-crosswalk-mcp
description: "CSOAI Governance Crosswalk MCP — 30 frameworks. Map EU AI Act, NIST, GDPR, HIPAA, CMMC 2.0, NDAA §1513, ISO 42001, and 23 more via 52-article Partnership Charter. Built by MEOK AI Labs."
version: 1.0.0
tools:
- name: query_crosswalk
  description: Query the CSOAI crosswalk mapping for a specific framework.
  parameters:
  - name: framework
    type: string
    required: true
  - name: article_or_clause
    type: string
    required: false
- name: crosswalk_bridge
  description: Bridge two frameworks through CSOAI — the killer feature.
  parameters:
  - name: framework_a
    type: string
    required: true
  - name: framework_b
    type: string
    required: true
  - name: focus_area
    type: string
    required: false
- name: compliance_gap_analysis
  description: Identify compliance gaps across multiple frameworks.
  parameters:
  - name: frameworks
    type: array
    required: true
  - name: organization_sector
    type: string
    required: false
- name: get_unified_crosswalk
  description: Return the CSOAI Master Unified Crosswalk showing all 30 frameworks mapped together.
  parameters: []
- name: search_by_topic
  description: Search across all crosswalks by topic.
  parameters:
  - name: topic
    type: string
    required: true
- name: list_frameworks
  description: List all 30 supported frameworks with metadata.
  parameters: []
- name: generate_compliance_report
  description: Generate a compliance requirements report for an organization.
  parameters:
  - name: jurisdictions
    type: array
    required: true
  - name: ai_use_cases
    type: array
    required: true
  - name: organization_size
    type: string
    required: false
- name: get_partnership_charter
  description: Return the CSOAI Partnership Charter information.
  parameters: []